    <!-- 
    vue3:
        组合式api
    create-vue
        是vue官方新的脚手架工具，底层切换到了vite(下一代构建工具)，为开发提供极速响应
        以前是vueCLI，底层是webpack
    使用create-vue创建项目
        1.前提环境条件：
            安装16.0及更高版本的node.js
            查看：node -v
        2.创建一个vue应用
            npm create vue@latest
            这一指令将会安装并执行create-vue
            安装vite
            npm install -g vite
        3.（在对应项目中）npm install 安装依赖 比如node-modules
    项目目录和关键文件：
        1.vite.config.js

    在main.js中创建vue，store，router
    createApp()
    createStore()
    createRouter()

    在组件内的script加上setuo，可以直接编写组合式api

    组件里面对于小组件的使用，不需要注册，导入就可以用

    template不再要求唯一根元素

    在vue3中可以任何组合computed，data，watch，methods等等，不再需要单独写在不用配置项里面
    -->
