    <!-- 
    组合式api
        1.setup选项写在组件配置项中，执行时机在before created之前
            因此在setup里面this不指向组件实例，因为此时组件还没有创建
        在setup中可以提供数据和方法，但是必须return { }，才能在模板中应用
        因此<script setup>语法糖，自动return数据和方法
            但是父组件无法通过 ref 访问内部内容，用 defineExpose({ xxx, yyy })暴露内容给父组件（通过 ref.value.xxx），需要导入
        2.reactive()
          接受对象类型数据作为参数传入，并返回一个响应式的对象
            import { reactive } from 'vue'
            const state = reactive(对象类型数据)
         ref() 
          接受简单类型数据或者复杂数据类型作为参数传入，并返回一个响应式的对象
            import { ref } from 'vue'
            const state = ref(数据)
            本质上是在原有传入数据的基础上，外层包了一层对象，包成了复杂类型，然后接住reactive实现响应式
            要访问数据，需要通过.value,即state.value,不过这是在脚本中
                输入的是简单数据类型： .value得到数据
                输入的是复杂数据类型： .value得到对象
            在template中不需要.value，帮我们扒开了一层
        都是利用函数构造的方式生成响应式数据

        2.computed：
            接受一个 getter 函数，返回一个只读的响应式 ref 对象，基本思想和vue2一致，但在组合式api下只修改了写法
            1.导入computed函数
                import { computed } from 'vue'
              使用时：
                const computedState = computed(() => {
                    1.对ref数据本身不修改，然后进行计算
                      return 基于响应式(ref)数据做计算后的值，但是ref数据本身不改变
                    2.可以修改ref数据
                      const count = ref(1)
                      const plusOne = computed({
                      get: () => count.value + 1, // 单纯使用计算属性直接用plusOne,不对原始数据修改
                      set: (val) => {  // 通过传入的值对ref原始数据进行修改，比如使用plusOne = 2，则将count.value修改为1,但是这里应该只能对响应式数据进行修改,对于const常量不能修改
                      count.value = val - 1
                      }
                      })
                      
                      plusOne.value = 1
                      console.log(count.value) // 0
                })
            2.执行函数在回调参数中return基于响应式数据计算后的值
          由于computed构造函数，由于是响应式的，因此不能接受异步操作或者修改dom元素
          避免直接修改计算属性的值
            计算属性应该是只读的，特殊情况可以配置get set

        3.watch
            侦听一个或多个响应式数据源，并在数据源变化时调用所给的回调函数
            支持额外两个参数：1.immediate(立即执行)  2.deep(深度侦听)
            1.导入watch函数
              import {watch} from 'vue'
            2.执行watch函数传入要侦听的响应式数据(ref对象)和回调函数
              watch(count, (newcount, oldcount)) => {
              
              })

            第一个参数是侦听器的源。这个来源可以是以下几种：
                一个函数，返回一个值
                一个 ref,而不是ref对象里面的value
                一个响应式对象
                ...或是由以上类型的值组成的数组，这样就可以监视多个数据源[ref1,ref2],得到的newdata也是一个数组
            第二个参数是在发生变化时要调用的回调函数。这个回调函数接受三个参数：新值、旧值，以及一个用于注册副作用清理的回调函数。
                该回调函数会在副作用下一次重新执行前调用，可以用来清除无效的副作用，例如等待中的异步请求。
                当侦听多个来源时，回调函数接受两个数组，分别对应来源数组中的新值和旧值。
            第三个可选的参数是一个对象，支持以下这些选项：
                immediate：在侦听器创建时立即触发回调。第一次调用时旧值是 undefined。如果监听的是多个数据源，那就是空数组
                deep：如果源是对象，强制深度遍历，以便在深层级变更时触发回调。在 3.5+ 中，此参数还可以是指示最大遍历深度的数字。参考深层侦听器。对于ref对象需要这个，但是reactive对象就不需要这个，因为ref对象多包了一层对象
                flush：调整回调函数的刷新时机。参考回调的刷新时机及 watchEffect()。
                onTrack / onTrigger：调试侦听器的依赖。参考调试侦听器。
                once：(3.4+) 回调函数只会运行一次。侦听器将在回调函数首次运行后自动停止
            
            如何精确监听对象的某个属性（在不开启deep的前提下）
                watch(() => state.value.chage, (newvalue, oldvalue) => {
                console.log(newvalue,oldvalue)
                })
                前面的() => state.value.chage这部分利用箭头函数的隐式return得到state对象的chage属性 
        生命周期：
              阶段      选项式 API (Options API)                                 组合式 API (Composition API)
            初始化阶段  beforeCreate / created                                   不需要（直接写在 setup 中）
            挂载阶段    beforeMount                                              onBeforeMount
            挂载完成    mounted                                                  onMounted
            更新阶段    beforeUpdate                                             onBeforeUpdate
            更新完成    updated                                                  onUpdated
            卸载阶段    beforeUnmount                                            onBeforeUnmount
            卸载完成    unmounted                                                onUnmounted
            错误捕获    errorCaptured                                            onErrorCaptured
            调试钩子    renderTracked / renderTriggered onRenderTracked          onRenderTriggered
                        这些都是生命周期函数，需要引入
            在beforeCreate/created里面写的代码，现在直接写在setup里面就可以
            在onMounted里面这样写：
                onMounted(()=>{
                    代码
                })
            这些生命周期函数可以调用多次，并不冲突
            普通异步操作执行顺序：同步代码 -> 注册生命周期钩子 -> setup 结束 -> 组件挂载 (onMounted) -> 异步请求完成 (fetchData内部)。

        父传子通信；
            父组件导入子组件时导入的名字要用大驼峰
            在选项式api中利用props，在组合式api中利用defineProps编译器宏函数接受子组件传递的数据
            1.父组件中给子组件绑定属性
                1.引入子组件
                2.使用子组件进行绑定属性
                <sonComVue message='this is africa'>
            2。子组件内部通过props选项接受
                const props = defineProps({
                    message: String
                })
                得到的props是一个对象，得到的message数据可以在模板中直接使用，不用props.message，但是在script里面还是要用props.message
            对于局部组件，导入进父组件就可以直接使用
            defineProps 和 defineEmits 都是只能在<script setup> 中使用的编译器宏。他们不需要导入，且会随着 <script setup> 的处理过程一同被编译掉。
            defineProps 接收与 props 选项相同的值，defineEmits 接收与 emits 选项相同的值。
        子传父通信：
            1.父组件中给子组件标签通过@绑定事件  和vue2差不多
                <div @事件名='自身处理方法名'>
            2.子组件内部通过emit方法触发事件
                子组件通过编译器宏defineEmits接受父组件的事件，
                    const emit = defineEmits(['事件名1', '事件名2'])
                并使用emit('事件名', 传递的数据)向父组件传递数据
                    emit('事件名', 传递的数据)

        模板引用：
            通过ref标识获取真实的dom对象或者组件实例对象，当然要在组件挂载完毕之后
            1.通过ref创建一个ref对象：
                const refSign = ref(null)
            2.在dom对象上面绑定
                <div ref='refSign'>
            3.在dom元素渲染完之后才可以使用refSign即onMounted阶段
                onMounted(() => {
                console.log(refSign.value.$el)
                // dom渲染完之后再打印
                })
            注意：但是在 Vue 3 中，为了实现响应式，几乎所有的对象（包括组件实例）都会被包装成 Proxy。 
            当你通过 ref 获取一个组件时，Vue 返回的是该组件的 Internal Component Instance（内部组件实例） 的代理。即Proxy(Object) {…}
            要想得到dom元素：访问refSign.value.$el
            要想得到子组件的数据：
                1.子组件暴露数据
                    defineExpose({
                        子组件的数据
                    })
                2.父组件通过ref
                     onMounted(() => {
                        console.log(refSign.value)
                     // 得到的是对象
                     })

        provide和inject    
            顶层组件向任意的底层组件传递数据和方法，实现跨层组件通信，也就是不同组件之间的通信
            1.顶层组件通过provide函数提供数据
                provide('key（相当于要传递的口号）', 顶层组件中的数据)
                这里的数据不仅可以是字面量，还可以是ref对象，不过传递过去的是ref.value
            2.底层组件通过inject函数获取数据
                const message = inject('key（口号）')
            比如说三层组件
                第一层：app.vue
                    使用着第二层
                第二层：middle.vue
                    使用着第三层
                第三层：bottom.vue
            在顶层组件app.vue:
                provide('color', 'red')
            在第二层middle.vue:
                const data = inject('color')
            在第三层bottom.vue：
                const data = inject('color')
            因此provide和inject可以做到跨层传递数据的效果
            但是不能够直接的在底层修改顶层的数据，可以通过在顶层传递修改数据的函数(该函数的最初定义必须在顶层组件)，实现数据的双向流通

        props&emit 与 provide&inject
        特性                Props & Emit                      Provide & Inject
        通信距离        父子组件（逐层传递）            祖先与后代（跨层级，深层嵌套）
        数据流向        双向：Props 下行，Emit 上行     单向为主：数据下行（但可传递函数实现上行）
        显式度          高。在模板中清晰可见            低。在代码中较隐蔽，不容易追踪来源
        耦合性          强耦合。中间组件必须参与转发    弱耦合。中间组件完全不知道数据存在
        适用场景        通用的、高度可复用的基础组件    插件开发、全局主题、多层级复杂业务状态
    
        defineOptions:
            在setup出现在scipt上之前，可以要定义props，emits可以轻而易举的添加一个和setup同级的属性
            但是setup出现在script上之后，就没法这样做了
            当然为了解决这两个问题，提供了编译器宏函数defineProps和defineEmits，不过只解决了props和emit这两个属性
          因此引入了defineOptions宏，主要是为了定义options api的选项。可以用defineOptions定义任意的r选项，但是props，emits，expose，slots除外（这些有专门的编译器宏函数）
          <script setup>
            defineOptions({
                name: 'Foo',
                inheritAttrs: false,
                // ...更多自定义属性
            })
          <script>
        
        v-model和defineModel(双向通信最为推荐)
            在vue3中，自定义组件上使用v-model，相当于传递一个modelValue属性，同时触发update:modelValue事件 :modelValue='isVisible' @update:modelValue='isVisible=$event'
            在vue2中，自定义组件上使用v-model，相当于一个语法糖：:value='value' @input='value=$event'
          不过现在不需要defineOptions()接收props了
          在父组件中：
            在子组件上使用v-model
          在子组件中：
            const modelValue = defineModel() // 相当于接收到的props,返回的依旧是ref对象，在template中不用取value，在script中需要
            modelValue.value++ // 接收到的props可以直接修改了，直接实现数据的双向绑定
